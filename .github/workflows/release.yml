name: Release

on:
  release:
    types: [published]

  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Create release artifacts
    if: github.repository_owner == 'GRID4EARTH'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          cache: false
          environments: export

      - name: generate artifacts
        run: |
          pixi run conda-environment env.yml
          pixi run requirements requirements.yml

      - name: save artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release artifacts
          path: "*.{yml,txt}"
          if-no-files-found: error

  extend-release:
    needs: build

    name: Upload release artifacts
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    permissions:
      contents: write # to edit the created release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release artifacts
          path: artifacts/

      - name: edit release
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload $GITHUB_TAG artifacts/env.yml artifacts/requirements.txt
